<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Eldryn Social — Painel de Posts</title>
<style>
  :root {
    --bg: #0d1526;
    --card: #131f36;
    --card2: #0f1a2e;
    --border: #23324f;
    --gold: #d4a94f;
    --gold-dim: #a8853c;
    --text: #e8ecf4;
    --muted: #8fa0bd;
    --green: #3ecf8e;
    --orange: #f0a35e;
    --red: #e06c6c;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
    padding: 24px 16px 80px;
    max-width: 860px;
    margin: 0 auto;
  }
  header { text-align: center; margin-bottom: 8px; }
  header h1 { color: var(--gold); font-size: 1.6rem; letter-spacing: 1px; }
  header p { color: var(--muted); font-size: .9rem; margin-top: 4px; }
  .toolbar {
    display: flex; justify-content: center; gap: 12px; align-items: center;
    margin: 16px 0 24px; flex-wrap: wrap;
  }
  .toolbar label { color: var(--muted); font-size: .9rem; cursor: pointer; user-select: none; }
  .rodada-badge {
    color: var(--muted); font-size: .8rem; text-transform: uppercase; letter-spacing: 1px;
    margin: 28px 0 10px; display: flex; align-items: center; gap: 10px;
  }
  .rodada-badge::after { content: ""; flex: 1; height: 1px; background: var(--border); }
  .card {
    background: var(--card); border: 1px solid var(--border); border-radius: 14px;
    padding: 18px; margin-bottom: 18px; transition: opacity .25s;
  }
  .card.tudo-postado { opacity: .38; }
  .card-head { display: flex; align-items: flex-start; gap: 10px; flex-wrap: wrap; }
  .card-head h2 { font-size: 1.15rem; flex: 1; min-width: 200px; }
  .badge {
    font-size: .72rem; padding: 3px 10px; border-radius: 20px; font-weight: 600;
    text-transform: uppercase; letter-spacing: .5px; white-space: nowrap;
  }
  .badge.oficial { background: rgba(62,207,142,.15); color: var(--green); border: 1px solid rgba(62,207,142,.4); }
  .badge.comunidade { background: rgba(240,163,94,.15); color: var(--orange); border: 1px solid rgba(240,163,94,.4); }
  .resumo { color: var(--muted); font-size: .92rem; margin: 10px 0; line-height: 1.5; }
  .fonte { font-size: .82rem; margin-bottom: 12px; }
  .fonte a { color: var(--gold); text-decoration: none; word-break: break-all; }
  .fonte a:hover { text-decoration: underline; }
  .midia {
    background: var(--card2); border: 1px dashed var(--border); border-radius: 10px;
    padding: 12px; margin-bottom: 14px; font-size: .88rem;
  }
  .midia .titulo-midia { color: var(--gold); font-weight: 600; margin-bottom: 6px; font-size: .8rem; text-transform: uppercase; letter-spacing: .5px; }
  .midia img { max-width: 100%; max-height: 260px; border-radius: 8px; margin-top: 8px; display: block; }
  .midia .nota { color: var(--muted); margin-top: 6px; }
  .rede { margin-top: 14px; }
  .rede-head { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; flex-wrap: wrap; }
  .rede-head .nome { font-weight: 600; font-size: .92rem; }
  .rede-head .contador { color: var(--muted); font-size: .78rem; margin-left: auto; }
  .rede-head .contador.estourou { color: var(--red); font-weight: 700; }
  textarea {
    width: 100%; background: var(--card2); color: var(--text);
    border: 1px solid var(--border); border-radius: 10px; padding: 12px;
    font-family: inherit; font-size: .95rem; line-height: 1.5; resize: vertical;
    min-height: 90px;
  }
  textarea:focus { outline: none; border-color: var(--gold-dim); }
  .acoes { display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; align-items: center; }
  button, .btn {
    background: var(--card2); color: var(--text); border: 1px solid var(--border);
    border-radius: 8px; padding: 8px 14px; font-size: .86rem; cursor: pointer;
    text-decoration: none; display: inline-flex; align-items: center; gap: 6px;
    font-family: inherit; transition: border-color .15s, background .15s;
  }
  button:hover, .btn:hover { border-color: var(--gold-dim); background: #182642; }
  .btn-primario { background: var(--gold); color: #14203a; border-color: var(--gold); font-weight: 700; }
  .btn-primario:hover { background: #e0b95f; border-color: #e0b95f; }
  .btn-mini { padding: 4px 10px; font-size: .76rem; color: var(--muted); }
  .postado-toggle { margin-left: auto; display: flex; align-items: center; gap: 5px; color: var(--muted); font-size: .8rem; cursor: pointer; user-select: none; }
  .postado-toggle input { accent-color: var(--green); cursor: pointer; }
  .vazio { text-align: center; color: var(--muted); padding: 60px 20px; }
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
    background: var(--gold); color: #14203a; font-weight: 700; padding: 10px 22px;
    border-radius: 30px; transition: transform .25s; z-index: 99; font-size: .9rem;
  }
  .toast.mostrar { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<header>
  <h1>⚔️ ELDRYN SOCIAL</h1>
  <p>Rascunhos prontos. Leia, ajuste se quiser e clique pra postar. Nada é publicado sozinho.</p>
</header>
<div class="toolbar">
  <label><input type="checkbox" id="mostrarPostados"> mostrar já postados</label>
</div>
<main id="lista"></main>
<div class="toast" id="toast">Copiado!</div>

<script src="posts/data.js"></script>
<script>
(function () {
  // ===== CONFIG =====
  const GRUPO_URL = "https://www.facebook.com/groups/hytalebrasil";
  const META_COMPOSER = "https://business.facebook.com/latest/composer";
  // ==================

  const posts = (window.ELDRYN_POSTS || []).slice();
  const lista = document.getElementById("lista");
  const toast = document.getElementById("toast");
  const chkMostrar = document.getElementById("mostrarPostados");

  const REDES = [
    { key: "twitter", nome: "🐦 Twitter / X" },
    { key: "meta", nome: "📱 Facebook + Instagram (Meta Business Suite)" },
    { key: "grupo", nome: "👥 Grupo do Facebook" },
  ];

  // compatibilidade com itens antigos que tinham instagram/facebook separados
  function textoDaRede(p, key) {
    if (key === "meta") return p.meta || p.instagram || "";
    if (key === "grupo") return p.grupo || p.facebook || "";
    return p[key] || "";
  }

  function lsGet(k, def) { try { return localStorage.getItem(k) ?? def; } catch (e) { return def; } }
  function lsSet(k, v) { try { localStorage.setItem(k, v); } catch (e) {} }
  function lsDel(k) { try { localStorage.removeItem(k); } catch (e) {} }

  function mostrarToast(msg) {
    toast.textContent = msg;
    toast.classList.add("mostrar");
    setTimeout(() => toast.classList.remove("mostrar"), 1600);
  }

  async function copiar(texto) {
    try {
      await navigator.clipboard.writeText(texto);
      mostrarToast("Copiado! 📋");
    } catch (e) {
      const ta = document.createElement("textarea");
      ta.value = texto;
      document.body.appendChild(ta);
      ta.select();
      try { document.execCommand("copy"); mostrarToast("Copiado! 📋"); }
      catch (e2) { mostrarToast("Não consegui copiar, seleciona e copia manualmente"); }
      document.body.removeChild(ta);
    }
  }

  // conta ~caracteres do X: qualquer URL vira 23
  function contarX(texto) {
    return texto.replace(/https?:\/\/\S+/g, "x".repeat(23)).length;
  }

  function render() {
    lista.innerHTML = "";
    if (!posts.length) {
      lista.innerHTML = '<div class="vazio">Nenhum rascunho ainda.<br>As varreduras automáticas vão preencher este painel.</div>';
      return;
    }
    posts.sort((a, b) => (b.rodada || "").localeCompare(a.rodada || ""));
    let rodadaAtual = null;
    const mostrarPostados = chkMostrar.checked;

    posts.forEach((p) => {
      const postadoEm = REDES.map(r => lsGet("postado:" + p.id + ":" + r.key, "") === "1");
      const tudoPostado = postadoEm.every(Boolean);
      if (tudoPostado && !mostrarPostados) return;

      if (p.rodada !== rodadaAtual) {
        rodadaAtual = p.rodada;
        const b = document.createElement("div");
        b.className = "rodada-badge";
        b.textContent = "varredura " + (p.rodada || "?");
        lista.appendChild(b);
      }

      const card = document.createElement("div");
      card.className = "card" + (tudoPostado ? " tudo-postado" : "");

      const head = document.createElement("div");
      head.className = "card-head";
      const h2 = document.createElement("h2");
      h2.textContent = (p.emoji ? p.emoji + " " : "") + p.titulo;
      const badge = document.createElement("span");
      badge.className = "badge " + (p.confiabilidade === "oficial" ? "oficial" : "comunidade");
      badge.textContent = p.confiabilidade === "oficial" ? "✔ oficial" : "⚠ comunidade — conferir";
      head.appendChild(h2);
      head.appendChild(badge);
      card.appendChild(head);

      if (p.resumo) {
        const r = document.createElement("p");
        r.className = "resumo";
        r.textContent = p.resumo;
        card.appendChild(r);
      }
      if (p.fonte) {
        const f = document.createElement("p");
        f.className = "fonte";
        f.innerHTML = "🔗 Fonte: ";
        const a = document.createElement("a");
        a.href = p.fonte; a.target = "_blank"; a.rel = "noopener";
        a.textContent = p.fonte + (p.fonteData ? " (" + p.fonteData + ")" : "");
        f.appendChild(a);
        card.appendChild(f);
      }

      if (p.midia) {
        const m = document.createElement("div");
        m.className = "midia";
        const t = document.createElement("div");
        t.className = "titulo-midia";
        t.textContent = "🖼 Mídia pra anexar";
        m.appendChild(t);
        if (p.midia.tipo === "imagem" && p.midia.url) {
          const linha = document.createElement("div");
          const abrir = document.createElement("a");
          abrir.className = "btn btn-mini"; abrir.href = p.midia.url; abrir.target = "_blank"; abrir.rel = "noopener";
          abrir.textContent = "abrir imagem em tamanho cheio";
          linha.appendChild(abrir);
          m.appendChild(linha);
          const img = document.createElement("img");
          img.src = p.midia.url; img.alt = "prévia da mídia"; img.loading = "lazy";
          img.onerror = () => { img.remove(); };
          m.appendChild(img);
        } else if (p.midia.tipo === "tweet" && p.midia.url) {
          const abrir = document.createElement("a");
          abrir.className = "btn btn-mini"; abrir.href = p.midia.url; abrir.target = "_blank"; abrir.rel = "noopener";
          abrir.textContent = "abrir tweet original";
          m.appendChild(abrir);
        }
        if (p.midia.nota) {
          const n = document.createElement("div");
          n.className = "nota";
          n.textContent = p.midia.nota;
          m.appendChild(n);
        }
        card.appendChild(m);
      }

      REDES.forEach((rede, idx) => {
        const original = textoDaRede(p, rede.key);
        if (!original) return;
        const bloco = document.createElement("div");
        bloco.className = "rede";

        const rh = document.createElement("div");
        rh.className = "rede-head";
        const nome = document.createElement("span");
        nome.className = "nome";
        nome.textContent = rede.nome;
        rh.appendChild(nome);

        let contador = null;
        if (rede.key === "twitter") {
          contador = document.createElement("span");
          contador.className = "contador";
          rh.appendChild(contador);
        }
        bloco.appendChild(rh);

        const ta = document.createElement("textarea");
        const lsKey = "texto:" + p.id + ":" + rede.key;
        ta.value = lsGet(lsKey, original);
        function atualizarContador() {
          if (!contador) return;
          let n = contarX(ta.value);
          if (p.midia && p.midia.tipo === "tweet") n += 24; // URL do quote
          contador.textContent = "~" + n + "/280";
          contador.classList.toggle("estourou", n > 280);
        }
        ta.addEventListener("input", () => {
          lsSet(lsKey, ta.value);
          atualizarContador();
        });
        atualizarContador();
        bloco.appendChild(ta);

        const acoes = document.createElement("div");
        acoes.className = "acoes";

        if (rede.key === "twitter") {
          const btnPostar = document.createElement("a");
          btnPostar.className = "btn btn-primario";
          btnPostar.textContent = p.midia && p.midia.tipo === "tweet" ? "🐦 Postar no X (quote)" : "🐦 Postar no X";
          btnPostar.target = "_blank"; btnPostar.rel = "noopener";
          btnPostar.addEventListener("click", () => {
            let url = "https://x.com/intent/post?text=" + encodeURIComponent(ta.value);
            if (p.midia && p.midia.tipo === "tweet" && p.midia.url) {
              url += "&url=" + encodeURIComponent(p.midia.url);
            }
            btnPostar.href = url;
          });
          btnPostar.href = "#";
          acoes.appendChild(btnPostar);
          if (p.midia && p.midia.tipo === "tweet" && p.midia.tweetId) {
            const btnRT = document.createElement("a");
            btnRT.className = "btn";
            btnRT.href = "https://x.com/intent/retweet?tweet_id=" + p.midia.tweetId;
            btnRT.target = "_blank"; btnRT.rel = "noopener";
            btnRT.textContent = "🔁 Só dar RT";
            acoes.appendChild(btnRT);
          }
          if (p.midia && (p.midia.tipo === "imagem" || p.midia.tipo === "print")) {
            const aviso = document.createElement("span");
            aviso.className = "btn btn-mini";
            aviso.style.cursor = "default";
            aviso.textContent = "⚠ anexar a imagem no composer";
            acoes.appendChild(aviso);
          }
        } else if (rede.key === "meta") {
          const btnCopiar = document.createElement("button");
          btnCopiar.className = "btn-primario";
          btnCopiar.textContent = "📋 Copiar texto";
          btnCopiar.addEventListener("click", () => copiar(ta.value));
          acoes.appendChild(btnCopiar);
          const abrir = document.createElement("a");
          abrir.className = "btn";
          abrir.href = META_COMPOSER;
          abrir.target = "_blank"; abrir.rel = "noopener";
          abrir.textContent = "abrir Meta Business Suite";
          acoes.appendChild(abrir);
        } else {
          const btnCopiar = document.createElement("button");
          btnCopiar.className = "btn-primario";
          btnCopiar.textContent = "📋 Copiar texto";
          btnCopiar.addEventListener("click", () => copiar(ta.value));
          acoes.appendChild(btnCopiar);
          const abrir = document.createElement("a");
          abrir.className = "btn";
          abrir.href = GRUPO_URL || "https://www.facebook.com/groups/feed/";
          abrir.target = "_blank"; abrir.rel = "noopener";
          abrir.textContent = GRUPO_URL ? "abrir o grupo" : "abrir grupos do Facebook";
          acoes.appendChild(abrir);
          const lembrete = document.createElement("span");
          lembrete.className = "btn btn-mini";
          lembrete.style.cursor = "default";
          lembrete.textContent = "⚠ postar como Hytale Brasil, não como perfil pessoal";
          acoes.appendChild(lembrete);
        }

        const btnRestaurar = document.createElement("button");
        btnRestaurar.className = "btn-mini";
        btnRestaurar.textContent = "restaurar original";
        btnRestaurar.addEventListener("click", () => {
          ta.value = original;
          lsDel(lsKey);
          atualizarContador();
        });
        acoes.appendChild(btnRestaurar);

        const togLabel = document.createElement("label");
        togLabel.className = "postado-toggle";
        const tog = document.createElement("input");
        tog.type = "checkbox";
        tog.checked = postadoEm[idx];
        tog.addEventListener("change", () => {
          lsSet("postado:" + p.id + ":" + rede.key, tog.checked ? "1" : "0");
          render();
        });
        togLabel.appendChild(tog);
        togLabel.appendChild(document.createTextNode("postado"));
        acoes.appendChild(togLabel);

        bloco.appendChild(acoes);
        card.appendChild(bloco);
      });

      lista.appendChild(card);
    });

    if (!lista.children.length) {
      lista.innerHTML = '<div class="vazio">Tudo postado! 🎉<br>Marque "mostrar já postados" pra rever.</div>';
    }
  }

  chkMostrar.addEventListener("change", render);
  render();
})();
</script>
</body>
</html>
