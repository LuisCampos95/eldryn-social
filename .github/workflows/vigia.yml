name: Vigia Hytale

on:
  schedule:
    - cron: "13,43 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: vigia
  cancel-in-progress: false

jobs:
  vigia:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verificar novidades no site do Hytale
        env:
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: bash .github/vigia.sh

      - name: Salvar estado
        run: |
          if ! git diff --quiet -- .github/watch-state.json; then
            git config user.name "vigia-bot"
            git config user.email "actions@users.noreply.github.com"
            git add .github/watch-state.json
            git commit -m "vigia: estado atualizado"
            git pull --rebase
            git push
          fi
